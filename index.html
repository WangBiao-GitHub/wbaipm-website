<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到 wbaipm.com</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { font-size: 36px; color: #333; margin-bottom: 16px; }
        p { color: #666; line-height: 1.8; font-size: 16px; margin-bottom: 10px; }
        .domain { color: #667eea; font-weight: bold; font-size: 20px; }
        .site-status { display: inline-block; background: #52c41a; color: white; padding: 6px 16px; border-radius: 20px; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 我的个人网站</h1>
        <p class="domain">wbaipm.com</p>
        <p>网站正在建设中，敬请期待！</p>
        <div class="site-status">✅ 网站已上线</div>
    </div>
</body>
</html>
