  <script>
    const infoButton = document.getElementById('info-button');
    const infoImage = document.getElementById('info-image');
    const music = document.getElementById('background-music');
    const wechatButton = document.getElementById('wechat-button');
    const qrPopup = document.getElementById('wechat-qrcode-popup');
    let infoToggled = false;

    music.volume = 0.4;
    music.play().catch(() => {});

    infoButton.addEventListener('click', () => {
      infoToggled = !infoToggled;
      infoImage.src = infoToggled ? 'images/info copy.png' : 'images/info.png';
      if (infoToggled) music.pause();
      else music.play().catch(() => {});
    });

    const setQrVisible = (visible) => {
      qrPopup.classList.toggle('visible', visible);
      qrPopup.setAttribute('aria-hidden', String(!visible));
    };

    wechatButton.addEventListener('mouseenter', () => setQrVisible(true));
    wechatButton.addEventListener('mouseleave', () => setQrVisible(false));
    wechatButton.addEventListener('focus', () => setQrVisible(true));
    wechatButton.addEventListener('blur', () => setQrVisible(false));
    qrPopup.addEventListener('mouseleave', () => setQrVisible(false));
  </script>

  <script>
    // ==================== 苦力怕追逐鼠标 ====================
    (function() {
      const creeper = document.getElementById('creeper');
      const canvas = document.getElementById('explosion-canvas');
      const ctx = canvas.getContext('2d');

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let cx = mouseX;
      let cy = mouseY;
      let exploded = false;
      let particles = [];
      let respawnTimer = 0;
      let screenShake = 0;
      let fuseLit = false;
      let fuseStart = 0;

      const SPEED = 0.035;
      const MIN_DIST = 70;
      const FUSE_DIST = 130;
      const EXPLODE_DIST = 45;
      const RESPAWN_DELAY = 2500;
      const FUSE_TIME = 800;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function spawnParticles(x, y, count) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 10;
          const size = 3 + Math.random() * 12;
          particles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.008 + Math.random() * 0.025,
            size: size,
            color: ['#5a3', '#7c4', '#9f5', '#3a2', '#ff0', '#fa0', '#f80', '#fff'][Math.floor(Math.random() * 8)]
          });
        }
      }

      function explode() {
        if (exploded) return;
        exploded = true;
        fuseLit = false;
        creeper.classList.add('creeper--exploded');
        screenShake = 20;
        spawnParticles(cx, cy, 80);
        respawnTimer = RESPAWN_DELAY;
      }

      function updateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15;
          p.life -= p.decay;
          if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
          }
          ctx.save();
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
          ctx.restore();
        }
      }

      function respawn() {
        exploded = false;
        creeper.classList.remove('creeper--exploded');
        cx = -80;
        cy = Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.1;
      }

      function loop(timestamp) {
        if (exploded) {
          respawnTimer -= 16.67;
          screenShake *= 0.85;
          if (screenShake < 0.3) screenShake = 0;
          if (respawnTimer <= 0) respawn();
        } else {
          // 追踪鼠标
          const dx = mouseX - cx;
          const dy = mouseY - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);

          // 引信逻辑
          if (dist < EXPLODE_DIST) {
            explode();
          } else if (dist < FUSE_DIST && !fuseLit) {
            fuseLit = true;
            fuseStart = timestamp;
            creeper.classList.add('creeper--fuse');
          } else if (dist >= FUSE_DIST && fuseLit) {
            fuseLit = false;
            creeper.classList.remove('creeper--fuse');
          }

          if (!exploded) {
            const vx = (dx / dist) * dist * SPEED;
            const vy = (dy / dist) * dist * SPEED;
            cx += vx;
            cy += vy;
          }
        }

        // 更新爆炸粒子
        updateParticles();

        // 屏震偏移
        let sx = 0, sy = 0;
        if (screenShake > 0.3) {
          sx = (Math.random() - 0.5) * screenShake * 2;
          sy = (Math.random() - 0.5) * screenShake * 2;
        }

        // 更新苦力怕位置
        creeper.style.left = (cx + sx) + 'px';
        creeper.style.top = (cy + sy) + 'px';

        // 朝向鼠标
        const facingRight = mouseX > cx;
        creeper.style.transform = facingRight ? 'scaleX(1)' : 'scaleX(-1)';

        requestAnimationFrame(loop);
      }

      respawn();
      requestAnimationFrame(loop);
    })();
  </script>
